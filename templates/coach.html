{% extends "base.html" %}

{% block title %}{{ current_user_name }}'s Coach {% endblock %}

{% block content %}
<div class="container mt-3" style="max-width: 900px;" id="coach-container">
    
    <div class="text-center py-5" id="loading-state">
        <div class="spinner-border text-secondary spinner-border-sm mb-2" role="status"></div>
        <p class="text-muted font-monospace" style="font-size: 0.8rem;">> INITIALIZING COACH ASSESSMENT...</p>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/coach/load')
        .then(response => response.text())
        .then(html => {
            document.getElementById('coach-container').innerHTML = html;
        })
        .catch(err => {
            document.getElementById('loading-state').innerHTML = 
                '<p class="text-danger font-monospace" style="font-size: 0.8rem;">> ERROR: COACH OFFLINE</p>';
        });
});
</script>
{% endblock %}
