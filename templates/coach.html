<!-- templates/coach.html -->
{% extends "base.html" %}

{% block content %}
<div class="container mt-3" style="max-width: 900px;">
    
    {% if not has_cache %}
    <div id="setup-area" class="card border shadow-sm p-4 mb-4 bg-light">
        <div class="text-center mb-4">
            <h5 class="fw-bold mb-1">Coach Configuration</h5>
            <p class="text-muted mb-0" style="font-size: 0.85rem;">Select your training objective</p>
        </div>
        
        <div class="mx-auto" style="max-width: 450px; width: 100%;">
            <div class="mb-3">
                <select id="goal-select" class="form-select font-monospace shadow-sm" style="font-size: 0.85rem;">
                    <option value="Base Build" {% if last_goal == 'Base Build' %}selected{% endif %}>Base Build (Aerobic Efficiency)</option>
                    <option value="Endurance" {% if last_goal == 'Endurance' %}selected{% endif %}>Endurance (Long-Ride Durability)</option>
                    <option value="FTP Increase" {% if last_goal == 'FTP Increase' %}selected{% endif %}>FTP Increase (Threshold/VO2 Focus)</option>
                    <option value="Race Taper" {% if last_goal == 'Race Taper' %}selected{% endif %}>Race Taper (Recovery/Sharpness)</option>
                    <option value="General Fitness" {% if last_goal == 'General Fitness' %}selected{% endif %}>General Fitness Maintenance</option>
                </select>
            </div>
            
            <div class="text-center">
                <button onclick="triggerCoach()" class="btn btn-outline-secondary fw-bold font-monospace shadow-sm px-5">
                    ANALYZE DATA
                </button>
            </div>
        </div>
    </div>
    {% endif %}

    <div id="loading-state" class="{% if not has_cache %}d-none{% endif %} text-center py-5">
        <div class="spinner-border text-secondary spinner-border-sm mb-2" role="status"></div>
        <p class="text-muted font-monospace" style="font-size: 0.8rem;">
            > {% if has_cache %}RETRIEVING LATEST ASSESSMENT...{% else %}GENERATING ASSESSMENT...{% endif %}
        </p>
    </div>

    <div id="coach-container"></div>

</div>

<script>
function triggerCoach() {
    const goalSelect = document.getElementById('goal-select');
    const goal = goalSelect ? goalSelect.value : 'General Fitness';
    
    const setupArea = document.getElementById('setup-area');
    const loading = document.getElementById('loading-state');
    const container = document.getElementById('coach-container');

    if (setupArea) setupArea.classList.add('d-none');
    loading.classList.remove('d-none');

    fetch(`/coach/load?goal=${encodeURIComponent(goal)}`)
        .then(response => response.text())
        .then(html => {
            loading.classList.add('d-none');
            container.innerHTML = html;
        });
}

// AUTO-TRIGGER: If cache exists, skip the button and load immediately
document.addEventListener('DOMContentLoaded', function() {
    if ({{ has_cache | tojson }}) {
        triggerCoach();
    }
});
</script>
{% endblock %}
