<!-- templates/coach.html -->
{% extends "base.html" %}

{% block content %}
<div class="container mt-3" style="max-width: 900px;">
    
    {% if not has_cache %}
    <div id="setup-area" class="card border shadow-sm p-4 mb-4 bg-light">
        <div class="text-center mb-4">
            <h5 class="fw-bold mb-1">Coach Configuration</h5>
            <p class="text-muted mb-0" style="font-size: 0.85rem;">Select your training objective</p>
        </div>
        
        <div class="mx-auto" style="max-width: 450px; width: 100%;">
            <div class="mb-3">
                <select id="goal-select" class="form-select font-monospace shadow-sm" style="font-size: 0.85rem;">
                    <option value="Base Build" {% if last_goal == 'Base Build' %}selected{% endif %}>Base Build (Aerobic Efficiency)</option>
                    <option value="Endurance" {% if last_goal == 'Endurance' %}selected{% endif %}>Endurance (Long-Ride Durability)</option>
                    <option value="FTP Increase" {% if last_goal == 'FTP Increase' %}selected{% endif %}>FTP Increase (Threshold/VO2 Focus)</option>
                    <option value="Race Taper" {% if last_goal == 'Race Taper' %}selected{% endif %}>Race Taper (Recovery/Sharpness)</option>
                    <option value="General Fitness" {% if last_goal == 'General Fitness' %}selected{% endif %}>General Fitness Maintenance</option>
                </select>
            </div>
            
            <div class="text-center">
                <button onclick="triggerCoach()" class="btn btn-outline-secondary fw-bold font-monospace shadow-sm px-5">
                    ANALYZE DATA
                </button>
            </div>
        </div>
    </div>
    {% endif %}

    <div id="loading-state" class="{% if not has_cache %}d-none{% endif %} text-center py-5">
        <div class="spinner-border text-secondary spinner-border-sm mb-2" role="status"></div>
        <p class="text-muted font-monospace" style="font-size: 0.8rem;">
            > {% if has_cache %}RETRIEVING LATEST ASSESSMENT...{% else %}GENERATING ASSESSMENT...{% endif %}
        </p>
    </div>

    <div id="coach-container"></div>

</div>

<script>
function triggerCoach() {
    const goalSelect = document.getElementById('goal-select');
    const goal = goalSelect ? goalSelect.value : 'General Fitness';
    
    const setupArea = document.getElementById('setup-area');
    const loading = document.getElementById('loading-state');
    const container = document.getElementById('coach-container');

    if (setupArea) setupArea.classList.add('d-none');
    loading.classList.remove('d-none');

    fetch(`/coach/load?goal=${encodeURIComponent(goal)}`)
        .then(response => response.text())
        .then(html => {
            loading.classList.add('d-none');
            container.innerHTML = html;
        });
}

// AUTO-TRIGGER: If cache exists, skip the button and load immediately
document.addEventListener('DOMContentLoaded', function() {
    if ({{ has_cache | tojson }}) {
        triggerCoach();
    }
});
</script>

<script>
    function copyCoachContext() {
        const container = document.getElementById('coach-container');
        
        // 1. Pull the data from the hidden inputs
        const systemEl = container.querySelector('#raw_system');
        const promptEl = container.querySelector('#raw_prompt');
        const statusEl = container.querySelector('#raw_status');
        const insightsEl = container.querySelector('#raw_insights');
    
        if (!systemEl || !promptEl) {
            console.error("Missing hidden inputs in the DOM.");
            return;
        }
    
        const fullMessage = `
    I am providing you with the technical context from my cycling analytics dashboard.
    
    ### 1. YOUR CORE INSTRUCTIONS:
    You are a high-performance cycling coach/sports scientist and I have follow up qustions to my below assessment:
    
    ### 2. MY RECENT TRAINING DATA (JSON):
    ${promptEl.value}
    
    ### 3. MY PREVIOUS ASSESSMENT HAS BEEN:
    STATUS: ${statusEl.value}
    INSIGHTS: ${insightsEl.value}
    
    ---
    ### MY FOLLOW-UP QUESTION:
    [Type your question here]`;
    
        // 2. Try modern copy, then fallback
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(fullMessage).then(() => {
                console.log("Context copied via Navigator API");
                updateCopyButton();
            }).catch(err => {
                console.warn("Navigator API failed, trying fallback...");
                fallbackCopy(fullMessage);
            });
        } else {
            fallbackCopy(fullMessage);
        }
    }
    
    // THIS WAS MISSING OR OUT OF SCOPE:
    function fallbackCopy(text) {
        const el = document.getElementById('coachClipboard');
        if (!el) {
            console.error("coachClipboard element not found in coach_content.html");
            return;
        }
        el.value = text;
        el.style.display = 'block';
        el.select();
        try {
            document.execCommand('copy');
            console.log("Context copied via Fallback Command");
            updateCopyButton();
        } catch (err) {
            console.error("All copy methods failed", err);
        }
        el.style.display = 'none';
    }
    
    function updateCopyButton() {
        const btn = document.getElementById('copyContextBtn');
        if (!btn) return;
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fa fa-check me-1"></i> COPIED!';
        btn.classList.replace('btn-outline-secondary', 'btn-success');
        
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.classList.replace('btn-success', 'btn-outline-secondary');
        }, 2500);
    }
    </script>

{% endblock %}
